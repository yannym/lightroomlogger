  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: '20'

  - name: Install dependencies
    # We use 'npm install' instead of 'npm ci' because 
    # 'npm ci' requires a package-lock.json file.
    run: npm install

  - name: Build project
    run: npm run build

  - name: Deploy
    uses: peaceiris/actions-gh-pages@v3
    with:
      github_token: ${{ secrets.GITHUB_TOKEN }}
      publish_dir: ./dist
