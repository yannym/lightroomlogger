<!DOCTYPE html>
<html lang="en">
<head>
  <!-- ... keep your head as is ... -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="min-h-screen bg-lrDarkest text-[#d2d5da] flex flex-col antialiased">
  
  <!-- Content -->
  <main id="app-root"><!-- Your main content here --></main>

  <!-- Modals will be injected here -->
  <div id="modal-container"></div>

  <script src="js/app.js"></script>
  <script>
    // Initialize
    window.onload = async () => {
      // 1. Fetch modals
      const response = await fetch('components/modals.html');
      document.getElementById('modal-container').innerHTML = await response.text();
      
      // 2. Initialize App
      initApp(); 
    };
  </script>
</body>
</html>
